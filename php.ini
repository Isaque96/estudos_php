[PHP]
; Exibição de erros (só em dev!)
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/log/php_errors.log

; Limites
max_execution_time = 60
memory_limit = 256M
post_max_size = 50M
upload_max_filesize = 50M

; Timezone
date.timezone = America/Sao_Paulo

; Encoding
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8

; Extensões úteis
extension=intl
extension=mbstring
extension=pdo_mysql
extension=mysqli
extension=curl
extension=gd
extension=zip
extension=openssl
extension=fileinfo

; Sessão
session.gc_maxlifetime = 1440
session.cookie_httponly = 1

; OPcache (desabilitar em dev para ver mudanças imediatamente)
opcache.enable = 0

